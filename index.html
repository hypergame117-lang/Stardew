<html>
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cultivos por Estación</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:#f4f4f4;
}

h1{
    margin-top:20px;
}

select{
    padding:8px;
    font-size:16px;
}

table{
    margin:20px auto;
    border-collapse:collapse;
    width:70%;
    background:white;
}

th, td{
    padding:10px;
    border:1px solid #ccc;
}

th{
    background:#444;
    color:white;
}
</style>

</head>
<body>

<h1>Cultivos por Estación</h1>

<select id="seasonSelect">
<option value="spring">Primavera</option>
<option value="summer">Verano</option>
<option value="fall">Otoño</option>
</select>

<table id="cropsTable">
<thead>
<tr>
<th>Cultivo</th>
<th>Costo de semilla</th>
<th>Precio de venta</th>
<th>Oro por día</th>
<th>Tiempo de crecimiento</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

const crops = {

spring: [
{crop:"Jazz azul", seed:30, sell:50, gold:3, growth:"7 días"},
{crop:"Coliflor", seed:80, sell:175, gold:8, growth:"12 días"},
{crop:"Ajo", seed:40, sell:60, gold:5, growth:"4 días"},
{crop:"Col rizada", seed:70, sell:110, gold:7, growth:"6 días"},
{crop:"Chirivía", seed:20, sell:35, gold:4, growth:"4 días"},
{crop:"Patata", seed:50, sell:80, gold:5, growth:"6 días"},
{crop:"Ruibarbo", seed:100, sell:220, gold:9, growth:"13 días"},
{crop:"Tulipán", seed:20, sell:30, gold:2, growth:"6 días"},
{crop:"Judía verde", seed:60, sell:40, gold:7, growth:"10 días"}
],

summer: [
{crop:"Trigo", seed:10, sell:25, gold:4, growth:"4 días"},
{crop:"Carambola", seed:400, sell:750, gold:27, growth:"13 días"},
{crop:"Lombarda", seed:100, sell:260, gold:18, growth:"9 días"},
{crop:"Rábano", seed:40, sell:90, gold:8, growth:"6 días"},
{crop:"Melón", seed:80, sell:250, gold:14, growth:"12 días"},
{crop:"Tomate", seed:50, sell:60, gold:9, growth:"11 días"},
{crop:"Chile", seed:40, sell:40, gold:11, growth:"5 días"},
{crop:"Arándano", seed:80, sell:50, gold:21, growth:"13 días"}
],

fall: [
{crop:"Amaranto", seed:70, sell:150, gold:11, growth:"7 días"},
{crop:"Alcachofa", seed:30, sell:160, gold:16, growth:"8 días"},
{crop:"Remolacha", seed:20, sell:100, gold:13, growth:"6 días"},
{crop:"Bok choy", seed:50, sell:80, gold:8, growth:"4 días"},
{crop:"Calabaza", seed:100, sell:320, gold:17, growth:"13 días"},
{crop:"Baya gema dulce", seed:1000, sell:3000, gold:83, growth:"24 días"},
{crop:"Ñame", seed:60, sell:160, gold:10, growth:"10 días"},
{crop:"Arándano rojo", seed:240, sell:75, gold:19, growth:"7 días"},
{crop:"Berenjena", seed:20, sell:60, gold:11, growth:"5 días"},
{crop:"Uva", seed:60, sell:80, gold:17, growth:"10 días"}
]

};

function showCrops(season){

const tbody = document.querySelector("#cropsTable tbody");
tbody.innerHTML="";

crops[season].forEach(c => {

let row = `
<tr>
<td>${c.crop}</td>
<td>${c.seed}</td>
<td>${c.sell}</td>
<td>${c.gold}</td>
<td>${c.growth}</td>
</tr>
`;

tbody.innerHTML += row;

});

}

document.getElementById("seasonSelect").addEventListener("change", e=>{
showCrops(e.target.value);
});

showCrops("spring");

</script>

</body>
</html>
