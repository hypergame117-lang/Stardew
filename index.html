<body>

<script>

function showCrops(season){

const tbody=document.getElementById("tableBody")
tbody.innerHTML=""

crops[season].forEach(c=>{

tbody.innerHTML+=`
<tr>
<td><img src="${c.img}"></td>
<td>${c.crop}</td>
<td>${c.seed}</td>
<td>${c.sell}</td>
<td>${c.gold}</td>
<td>${c.growth}</td>
</tr>
`

})

}

document.getElementById("seasonSelect").addEventListener("change",e=>{
showCrops(e.target.value)
})

showCrops("spring")

</script>
